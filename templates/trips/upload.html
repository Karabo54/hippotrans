{% extends "base.html" %}
{% block content %}

<style>
    .upload-card {
        max-width: 500px;
        margin: 50px auto;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        text-align: center;
        border: 1px solid #e2e8f0;
    }
    .upload-icon { font-size: 40px; color: #0ea5e9; margin-bottom: 20px; }
    .file-input { margin: 20px 0; padding: 20px; border: 2px dashed #cbd5e1; border-radius: 12px; width: 100%; box-sizing: border-box; cursor: pointer; }
    .btn-upload { background: #1e293b; color: white; border: none; padding: 14px 30px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; }
    .btn-upload:hover { background: #0ea5e9; transform: translateY(-2px); }
</style>

<div class="container">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div style="padding: 15px; margin-bottom: 20px; border-radius: 10px; background-color: #dcfce7; color: #166534; text-align: center;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="upload-card">
        <div class="upload-icon">📤</div>
        <h2 style="margin-top:0;">Upload Orders Pool</h2>
        <p style="color: #64748b; margin-bottom: 30px;">Select your <strong>orders.csv</strong> to update the available trips list.</p>

        <form action="/trips/upload" method="post" enctype="multipart/form-data">
            <input type="file" name="file" class="file-input" required accept=".csv">
            <button type="submit" class="btn-upload">UPDATE ORDERS POOL</button>
        </form>
    </div>
</div>

{% endblock %}
